{% extends 'kasir/base.html' %}
{% load i18n %}

{% block content %}

<div class="container mt-5">

    <h2>
    ➕ {% trans "Tambah Produk" %}
    </h2>

    <div class="card">

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success">

                    {% trans "Simpan Produk" %}

                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
