{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html>
<head>
    <title>HalalMart Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        *{
    font-family: 'Nunito', sans-serif;
}

h1,h2,h3,h4,h5,h6{
    font-weight:700;
}

.navbar-brand{
    font-weight:800;
}

    body{
    min-height:100vh;

    background: linear-gradient(
        135deg,
        #ffffff,
        #3d7a3e,
        #088331
    );

    color:white;
}

    .card{
        border:none;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        transition:0.3s;
    }

    .card:hover{
        transform:translateY(-5px);
    }

    .navbar{
        box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }

    .light-mode{
    background:white !important;
    color:black !important;
}

.light-mode .card{
    background:white;
    color:black;
}

.light-mode .navbar{
    background:#f8f9fa !important;
}

.light-mode .navbar a{
    color:black !important;
}

    </style>

</head>

<body id="bodyHalalMart">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand d-flex align-items-center" href="/">

    <img
        src="{% static 'images/HalalMart Pro.png' %}"
        alt="HalalMart Pro"
        height="50"
        class="me-2"
    >

    <span class="fw-bold">
        HalalMart Pro
    </span>

</a>

<button
    id="menuButton"
    class="btn btn-outline-secondary"
    type="button"
    data-bs-toggle="offcanvas"
    data-bs-target="#menuHalalMart">

☰

</button>

</div>

</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

<div
class="offcanvas offcanvas-start text-bg-dark"
tabindex="-1"
id="menuHalalMart">

<div class="offcanvas-header">

    <h5 class="offcanvas-title">
        {% trans "HalalMart Pro" %}
    </h5>

    <button
        type="button"
        class="btn-close btn-close-white"
        data-bs-dismiss="offcanvas">
    </button>

</div>

<div class="offcanvas-body">

    <a href="/" class="btn btn-outline-light w-100 mb-2">
    🏠 {% trans "Menu Utama" %}
</a>

<a href="/jual/" class="btn btn-outline-light w-100 mb-2">
    🛍 {% trans "Pemesanan" %}
</a>

<a href="/produk/" class="btn btn-outline-light w-100 mb-2">
    📦 {% trans "Produk Kami" %}
</a>

<a href="/transaksi/" class="btn btn-outline-light w-100 mb-2">
    📋 {% trans "Riwayat Transaksi" %}
</a>
    <hr>

    <button
        class="btn btn-warning w-100 mb-2"
        onclick="toggleTheme()">

        🌙 {% trans "Tema Gelap/Terang" %}

    </button>

    <form
    action="{% url 'set_language' %}"
    method="post">

    {% csrf_token %}

    <select
        name="language"
        onchange="this.form.submit()"
        class="form-select">

        <option value="id">
            Indonesia
        </option>

        <option value="en">
            English
        </option>

    </select>

</form>

</div>

</div>

<script>

function toggleTheme(){

    const body =
        document.getElementById(
            "bodyHalalMart"
        );

    body.classList.toggle(
        "light-mode"
    );

    localStorage.setItem(
        "tema",
        body.classList.contains(
            "light-mode"
        )
    );
}

window.onload = function(){

    if(
        localStorage.getItem(
            "tema"
        ) === "true"
    ){

        document
        .getElementById(
            "bodyHalalMart"
        )
        .classList.add(
            "light-mode"
        );

    }

}

</script>

</body>
</html>
