<!DOCTYPE html>
<html>
<head>
    <title>HalalMart Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

    body{
        min-height:100vh;

        background: linear-gradient(
            135deg,
            #0f172a,
            #1e293b,
            #334155
        );

        color:white;
    }

    .card{
        border:none;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.2);
        transition:0.3s;
    }

    .card:hover{
        transform:translateY(-5px);
    }

    .navbar{
        box-shadow:0 4px 10px rgba(0,0,0,0.3);
    }

    </style>

</head>

{% block scripts %}
{% endblock %}

</body>

<body>

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">
🛒 HalalMart Pro
</a>

<div>

<a href="/" class="btn btn-outline-light btn-sm">
Dashboard
</a>

<a href="/produk/" class="btn btn-outline-light btn-sm">
Produk
</a>

<a href="/jual/" class="btn btn-outline-light btn-sm">
Jual
</a>

<a href="/transaksi/" class="btn btn-outline-light btn-sm">
Transaksi
</a>

<a href="/laporan/" class="btn btn-outline-light btn-sm">
Laporan
</a>

</div>

</div>

</nav>

<div class="container mt-4">

{% block content %}
{% endblock %}

</div>

</body>
</html>
