{% extends 'kasir/base.html' %}

{% block content %}

<div class="container mt-5">

    <h1 class="mb-4">🛒 HalalMart Pro</h1>

    <h3>Daftar Produk</h3>

    <form method="GET" class="mb-3">

    <input
        type="text"
        name="q"
        class="form-control"
        placeholder="Cari produk..."
    >

</form>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Nama Produk</th>
                <th>Harga</th>
                <th>Stok</th>
            </tr>
        </thead>

        <tbody>
            {% for item in produk %}
            <tr>
                <td>{{ item.nama }}</td>
                <td>Rp {{ item.harga }}</td>
                <td>{{ item.stok }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
