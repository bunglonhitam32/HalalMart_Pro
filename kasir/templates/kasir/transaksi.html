{% extends 'kasir/base.html' %}

{% block content %}

<div class="container mt-5">

    <h1>📋 Riwayat Transaksi</h1>

    <table class="table table-striped">

        <thead>
            <tr>
                <th>Produk</th>
                <th>Jumlah</th>
                <th>Total Harga</th>
                <th>Tanggal</th>
            </tr>
        </thead>

        <tbody>

            {% for item in transaksi %}

            <tr>

                <td>{{ item.produk.nama }}</td>

                <td>{{ item.jumlah }}</td>

                <td>Rp {{ item.total_harga }}</td>

                <td>{{ item.tanggal }}</td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

    <a href="/" class="btn btn-primary">
        Dashboard
    </a>

</div>

{% endblock %}
